services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.combined
    container_name: leyl_app
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/leylcafe.db
      SECRET_KEY: ${SECRET_KEY:-leyl-pastane-change-this-secret-key-32}
      APP_ENV: production
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      CORS_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - db_data:/app/data
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  db_data:
    driver: local
